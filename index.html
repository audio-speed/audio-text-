<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVESUBS Clone - Subtitle Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1a1c2c;
            --card-bg: #24273d;
            --primary-purple: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header / Logo Section */
        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            max-width: 1000px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-purple);
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .version {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-left: 10px;
        }

        .menu-btn {
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            font-size: 1.2rem;
            color: #fb923c; /* Orange accent like your image */
            margin-bottom: 30px;
        }

        /* Input Box */
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 20px;
        }

        .search-box i { color: var(--text-gray); margin-right: 10px; }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 1rem;
            outline: none;
        }

        /* Buttons */
        .btn-download {
            background: var(--primary-purple);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .btn-download:hover { background: var(--primary-hover); }

        .divider {
            color: var(--text-gray);
            font-style: italic;
            margin: 20px 0;
            display: block;
        }

        .select-files-area {
            border: 2px dashed var(--primary-purple);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .select-files-area:hover { background: rgba(139, 92, 246, 0.1); }

        .select-files-area i { color: var(--primary-purple); margin-right: 10px; }

        .drag-text {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-top: 10px;
            display: block;
        }

        /* Bottom Steps Navigation */
        .steps-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 600px;
            margin-top: 60px;
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-gray);
            font-size: 0.8rem;
            text-transform: uppercase;
            gap: 10px;
        }

        .step-icon {
            background: var(--card-bg);
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .step:hover .step-icon {
            border-color: var(--primary-purple);
            color: var(--primary-purple);
        }

        .active-step .step-icon {
            color: var(--primary-purple);
            border-color: var(--primary-purple);
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SAVESUBS<span class="version">V9.2.0</span></div>
        <div class="menu-btn"><i class="fas fa-bars"></i></div>
    </header>

    <div class="container">
        <h1># Online Subtitle Convert Tools #</h1>

        <div class="search-box">
            <i class="fas fa-angle-double-down"></i>
            <input type="text" placeholder="Search or enter any url to download">
            <i class="fas fa-copy" style="cursor:pointer;"></i>
        </div>

        <button class="btn-download">DOWNLOAD</button>

        <span class="divider">OR</span>

        <label for="fileInput" class="select-files-area">
            <i class="fas fa-folder-open"></i> SELECT FILES
            <span class="drag-text">or, drag and drop here</span>
        </label>
        <input type="file" id="fileInput" multiple>

        <div class="steps-container">
            <div class="step active-step">
                <div class="step-icon"><i class="fas fa-sync-alt"></i></div>
                <span>Convert SRT</span>
            </div>
            <div class="step">
                <div class="step-icon"><i class="fas fa-edit"></i></div>
                <span>Edit SRT</span>
            </div>
            <div class="step">
                <div class="step-icon"><i class="fas fa-download"></i></div>
                <span>Download SRT</span>
            </div>
        </div>
    </div>

    <script>
        // ဖိုင်ရွေးလိုက်တဲ့အခါ လုပ်ဆောင်မယ့် Function (အစမ်း)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if(this.files.length > 0) {
                alert(this.files.length + " files selected. Ready to convert!");
            }
        });

        // Download Button နှိပ်ရင် စာသားပါမပါ စစ်ဆေးခြင်း
        document.querySelector('.btn-download').addEventListener('click', function() {
            const input = document.querySelector('.search-box input').value;
            if(!input) {
                alert("Please enter a URL first!");
            } else {
                alert("Processing: " + input);
            }
        });
    </script>
</body>
</html>
