<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro - Myanmar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #00f28f;
            --input-bg: #0d1117;
            --text-dim: #8b949e;
            --success: #3fb950;
            --error: #ff7b72;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid #30363d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header {
            text-align: center;
            color: var(--accent);
            font-size: 1.6rem;
            margin-bottom: 25px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 0.95rem;
        }

        input:focus, select:focus { border-color: var(--accent); }

        .password-wrapper { position: relative; }
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-dim);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-verify { background: #238636; color: white; margin-top: 10px; }
        .btn-verify:hover { background: #2ea043; }

        .btn-start { 
            background: var(--accent); 
            color: black; 
            margin-top: 20px; 
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 242, 143, 0.2);
        }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

        .status {
            font-size: 0.85rem;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        textarea {
            height: 150px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            background: #010409;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-robot"></i> Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input SRT File</label>
        <input type="file" id="fileInput" accept=".srt">
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <div class="password-wrapper">
            <input type="password" id="apiKey" placeholder="AI API Key ကို ထည့်ပါ...">
            <i class="fas fa-eye eye-icon" id="toggleEye" onclick="toggleKey()"></i>
        </div>
        <button class="btn btn-verify" id="verifyBtn" onclick="checkKey()">Verify Key</button>
        <div id="vStatus" class="status" style="color: var(--error);">
            <i class="fas fa-circle-exclamation"></i> <span>Not Verified</span>
        </div>
    </div>

    <div class="input-group">
        <label>AI Model</label>
        <select id="modelSelect">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (မြန်ဆန်)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (ပိုမိုတိကျ)</option>
        </select>
    </div>

    <button class="btn btn-start" id="startBtn" onclick="processTranslation()">
        <i class="fas fa-magic"></i> Start Translation
    </button>

    <div class="input-group" style="margin-top: 25px;">
        <label>Output Preview</label>
        <textarea id="outputBox" readonly placeholder="ဘာသာပြန်ပြီးသား စာသားများကို ဤနေရာတွင် ပြပေးပါမည်..."></textarea>
    </div>
</div>

<script>
    let isVerified = false;

    // API Key မျက်လုံး ပိတ်/ဖွင့်
    function toggleKey() {
        const input = document.getElementById('apiKey');
        const icon = document.getElementById('toggleEye');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // API Key မှန်မမှန် စစ်ဆေးခြင်း
    async function checkKey() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('vStatus');
        const statusText = status.querySelector('span');
        const statusIcon = status.querySelector('i');

        if (!key) return alert("Key အရင်ထည့်ပါ");

        statusText.innerText = "Checking...";
        statusIcon.className = "fas fa-spinner fa-spin";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            if (res.ok) {
                isVerified = true;
                status.style.color = "var(--success)";
                statusText.innerText = "Verified Successfully!";
                statusIcon.className = "fas fa-check-circle";
                document.getElementById('verifyBtn').style.display = "none";
            } else { throw new Error(); }
        } catch (e) {
            status.style.color = "var(--error)";
            statusText.innerText = "Invalid API Key!";
            statusIcon.className = "fas fa-circle-xmark";
        }
    }

    // SRT ဖိုင်ကို ဖတ်ပြီး ဘာသာပြန်ခြင်း
    async function processTranslation() {
        const fileInput = document.getElementById('fileInput');
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('outputBox');
        const btn = document.getElementById('startBtn');
        const model = document.getElementById('modelSelect').value;

        if (!fileInput.files[0]) return alert("SRT ဖိုင် အရင်ရွေးချယ်ပါ");
        if (!isVerified) return alert("API Key ကို အရင် Verify လုပ်ပေးပါ");

        const file = fileInput.files[0];
        const reader = new FileReader();

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ဘာသာပြန်နေပါပြီ...';
        output.value = "ဖိုင်ကို AI ထံ ပေးပို့နေပါပြီ။ ခဏစောင့်ပေးပါ...";

        reader.onload = async (e) => {
            const srtContent = e.target.result;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Translate the following SRT subtitle content into Myanmar language. Keep the original SRT format (timestamps and index numbers) exactly. Only translate the dialogue text:\n\n${srtContent}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.value = data.candidates[0].content.parts[0].text;
                    alert("ဘာသာပြန်ခြင်း ပြီးဆုံးပါပြီ။");
                } else {
                    throw new Error("API Error");
                }

            } catch (error) {
                output.value = "အမှားအယွင်းရှိနေပါသည်။ ဖိုင်အရွယ်အစား ကြီးလွန်းခြင်း သို့မဟုတ် API Limit ပြည့်သွားခြင်း ဖြစ်နိုင်ပါသည်။";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> Start Translation';
            }
        };

        reader.readAsText(file);
    }
</script>

</body>
</html>
