<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --card: #151921; --input: #1f242d; --accent: #00f28f; --text: #e1e1e1; --text-dim: #8b949e; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-card { width: 100%; max-width: 450px; background: var(--card); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        h2 { text-align: center; margin-bottom: 25px; }
        .section { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-dim); font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px 15px; background: var(--input); border: 1px solid #30363d; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        .btn { border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #050505; width: 100%; padding: 14px; margin-top: 10px; }
        .status { font-size: 0.8rem; color: #ff7b72; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Subtitle AI Pro</h2>
    <div class="section">
        <label>Input Files (MP3 / SRT)</label>
        <input type="file" multiple>
    </div>

    <div class="section">
        <label>Gemini API Key</label>
        <div style="display: flex; gap: 8px;">
            <div style="position: relative; flex: 1;">
                <input type="password" id="apiKey" placeholder="Enter key...">
                <i class="fas fa-eye" id="eyeIcon" onclick="toggleKey()" style="position: absolute; right: 12px; top: 35%; cursor: pointer; color: var(--text-dim);"></i>
            </div>
            <button class="btn btn-primary" style="width: auto; margin-top: 0; padding: 0 20px;">Verify</button>
        </div>
        <div class="status"><i class="fas fa-circle-exclamation"></i> Not Verified</div>
    </div>

    <div class="section">
        <label>AI Model</label>
        <select>
            <option>Gemini 3 Flash Preview</option>
            <option>Gemini 3.1 Pro Preview</option>
            <option>Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <div class="section">
        <label>Output Format</label>
        <select>
            <option>Myanmar SRT (Translated)</option>
            <option>Original SRT (English)</option>
        </select>
    </div>

    <button class="btn btn-primary"><i class="fas fa-magic"></i> Start Translation</button>
</div>

<script>
    function toggleKey() {
        const keyInput = document.getElementById('apiKey');
        const eyeIcon = document.getElementById('eyeIcon');
        if (keyInput.type === 'password') {
            keyInput.type = 'text';
            eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            keyInput.type = 'password';
            eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
</body>
</html>
