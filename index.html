<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVESUBS - Subtitle Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1a1c2c;
            --card-bg: #24273d;
            --primary-purple: #8b5cf6;
            --text-white: #ffffff;
            --text-gray: #94a3b8;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 600px; text-align: center; margin-top: 30px; }
        .logo { font-size: 2.5rem; font-weight: 900; color: var(--primary-purple); margin-bottom: 20px; }
        
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            padding: 12px;
            margin-bottom: 15px;
        }

        .search-box input {
            background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 1rem;
        }

        .btn-main {
            background: var(--primary-purple);
            color: white; border: none; width: 100%;
            padding: 15px; border-radius: 8px;
            font-weight: bold; cursor: pointer;
            margin-bottom: 20px;
        }

        .file-upload-area {
            border: 2px dashed var(--primary-purple);
            padding: 30px; border-radius: 10px;
            cursor: pointer; display: block;
            color: var(--text-gray);
        }

        #editorArea {
            display: none;
            margin-top: 20px;
            text-align: left;
        }

        textarea {
            width: 100%; height: 200px;
            background: #0f172a; color: #10b981;
            border: 1px solid var(--border-color);
            padding: 10px; border-radius: 8px;
            font-family: monospace;
        }

        .steps {
            display: flex; justify-content: space-around;
            margin-top: 40px; border-top: 1px solid var(--border-color);
            padding-top: 20px; width: 100%;
        }

        .step { color: var(--text-gray); font-size: 0.7rem; text-align: center; }
        .step i { display: block; font-size: 1.5rem; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="logo">SAVESUBS</div>

    <div class="container">
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="Enter video URL to fetch subtitles...">
        </div>

        <button class="btn-main" onclick="processURL()">DOWNLOAD / FETCH</button>

        <label for="fileInput" class="file-upload-area">
            <i class="fas fa-file-upload"></i> SELECT SRT/TXT FILE
            <br><span style="font-size: 0.8rem;">Click to upload and edit</span>
        </label>
        <input type="file" id="fileInput" accept=".srt,.txt" style="display:none;">

        <div id="editorArea">
            <h3 style="color: var(--primary-purple);">Subtitle Editor</h3>
            <textarea id="srtContent"></textarea>
            <button class="btn-main" style="background: #10b981; margin-top: 10px;" onclick="downloadSRT()">DOWNLOAD EDITED SRT</button>
        </div>

        <div class="steps">
            <div class="step"><i class="fas fa-sync-alt"></i>CONVERT</div>
            <div class="step"><i class="fas fa-edit"></i>EDIT</div>
            <div class="step"><i class="fas fa-download"></i>DOWNLOAD</div>
        </div>
    </div>

    <script>
        // URL လုပ်ဆောင်ချက် (Fetch Logic အကြမ်း)
        function processURL() {
            const url = document.getElementById('urlInput').value;
            if(url) {
                alert("Fetching subtitles from: " + url + "\n(Note: Server-side API is needed for real YouTube fetching)");
            } else {
                alert("Please enter a URL");
            }
        }

        // ဖိုင်ဖတ်ပေးမယ့် Logic
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('editorArea').style.display = 'block';
                document.getElementById('srtContent').value = e.target.result;
            };
            reader.readAsText(file);
        });

        // ပြင်ထားတာကို Download ပြန်လုပ်နည်း
        function downloadSRT() {
            const content = document.getElementById('srtContent').value;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "edited_subtitle.srt";
            a.click();
        }
    </script>
</body>
</html>
