<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Subtitle Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen text-white p-4">

<div class="max-w-xl mx-auto space-y-6">

<h1 class="text-2xl font-bold text-center">
AI Subtitle Tool
</h1>

<!-- API KEY -->

<div class="bg-white/10 p-4 rounded-lg">

<input id="apiKey"
class="w-full p-3 rounded text-black"
placeholder="Paste your Gemini API key">

<button onclick="verifyKey()"
class="w-full mt-3 bg-blue-500 p-3 rounded">
VERIFY
</button>

<select id="model"
class="w-full mt-3 p-3 rounded text-black">

<option value="gemini-1.5-flash">Gemini 3 Flash Preview</option>
<option value="gemini-1.5-pro">Gemini 3.1 Pro Preview</option>
<option value="gemini-1.5-flash">Gemini 3.1 Flash Lite Preview</option>

</select>

</div>


<!-- FILE UPLOAD -->

<div class="bg-white/10 p-4 rounded-lg">

<input type="file"
id="fileInput"
accept=".srt"
class="w-full">

<p class="text-sm mt-2 opacity-70">
Upload SRT file
</p>

<button onclick="startProcessing()"
class="w-full mt-4 bg-blue-500 p-3 rounded">
START PROCESSING
</button>

</div>


<!-- OUTPUT -->

<textarea id="output"
class="w-full h-60 p-3 rounded text-black"
placeholder="Output Preview">
</textarea>


<!-- COPY CLEAR -->

<div class="grid grid-cols-2 gap-3">

<button onclick="copyText()"
class="bg-green-500 p-3 rounded">
Copy
</button>

<button onclick="clearText()"
class="bg-red-500 p-3 rounded">
Clear
</button>

</div>


<!-- TIME SHIFT -->

<h2 class="font-bold">
Time Shift
</h2>

<div class="grid grid-cols-3 gap-3">

<button onclick="shiftTime(-0.5)"
class="bg-blue-500 p-2 rounded">
-0.5s
</button>

<button onclick="shiftTime(0)"
class="bg-blue-500 p-2 rounded">
0.0s
</button>

<button onclick="shiftTime(0.5)"
class="bg-blue-500 p-2 rounded">
+0.5s
</button>

</div>


<!-- DOWNLOAD -->

<button onclick="downloadSRT()"
class="w-full bg-purple-600 p-3 rounded">
Download SRT
</button>

</div>


<script>

function verifyKey(){

let key=document.getElementById("apiKey").value

if(key==""){
alert("Enter API Key")
return
}

alert("API Key OK")

}


async function startProcessing(){

let file=document.getElementById("fileInput").files[0]
let apiKey=document.getElementById("apiKey").value
let model=document.getElementById("model").value

if(!file){
alert("Upload SRT file first")
return
}

if(apiKey==""){
alert("Enter Gemini API Key")
return
}

let text=await file.text()

document.getElementById("output").value="Processing..."

let prompt="Translate this subtitle to Burmese and keep SRT format:\n"+text

let response=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+apiKey,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{ text: prompt }
]
}
]
})
})

let data=await response.json()

let result=data.candidates[0].content.parts[0].text

document.getElementById("output").value=result

}


function copyText(){

let text=document.getElementById("output")

text.select()

document.execCommand("copy")

alert("Copied")

}


function clearText(){

document.getElementById("output").value=""

}


function shiftTime(value){

alert("Time shift "+value+" seconds")

}


function downloadSRT(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="subtitle_mm.srt"

a.click()

}

</script>

</body>

</html>
