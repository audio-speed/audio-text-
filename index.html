<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --input-bg: #0d1117;
            --accent-green: #00f28f;
            --text-white: #ffffff;
            --text-gray: #8b949e;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--accent-green);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        input[type="file"], input[type="text"], input[type="password"], select, textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        /* Password Wrapper for Eye Icon */
        .password-wrapper {
            position: relative;
        }

        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-gray);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-verify {
            background-color: #238636;
            color: white;
            font-size: 0.85rem;
        }

        .btn-verify:hover { background-color: #2ea043; }

        .btn-start {
            background-color: var(--accent-green);
            color: #000;
            font-size: 1rem;
            margin-top: 20px;
        }

        .btn-start:hover { transform: scale(1.02); }

        .status {
            font-size: 0.8rem;
            color: #ff7b72;
            margin-top: 5px;
        }

        textarea {
            height: 100px;
            resize: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-robot"></i> Subtitle AI Pro</h2>

    <div class="input-group">
        <label>Input Files (MP3 / SRT)</label>
        <input type="file" multiple>
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <div class="password-wrapper">
            <input type="password" id="apiKey" placeholder="Enter your key here...">
            <i class="fas fa-eye eye-icon" id="toggleEye" onclick="togglePassword()"></i>
        </div>
        <button class="btn btn-verify" onclick="alert('Checking API Key...')">
            <i class="fas fa-shield-check"></i> Verify API Key
        </button>
        <div class="status" id="statusLabel">
            <i class="fas fa-exclamation-circle"></i> Not Verified
        </div>
    </div>

    <div class="input-group">
        <label>AI Model</label>
        <select id="modelSelect">
            <option>Gemini 3 Flash Preview</option>
            <option>Gemini 3.1 Pro Preview</option>
            <option>Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <div class="input-group">
        <label>Output Format</label>
        <select id="outputSelect">
            <option>Myanmar SRT (Translated)</option>
            <option>Original SRT (English)</option>
        </select>
    </div>

    <button class="btn btn-start">
        <i class="fas fa-play"></i> Start Translation
    </button>

    <div class="input-group" style="margin-top: 20px;">
        <label>Result Preview</label>
        <textarea readonly placeholder="Waiting for process..."></textarea>
    </div>
</div>

<script>
    // Password ပိတ်/ဖွင့် လုပ်တဲ့ Function
    function togglePassword() {
        const passwordInput = document.getElementById('apiKey');
        const eyeIcon = document.getElementById('toggleEye');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        }
    }
</script>

</body>
</html>
