<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ko Paing - Media AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #080d1a; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 32px; }
        .input-box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; transition: 0.2s; }
        .input-box:focus-within { border-color: #3b82f6; }
        .step-badge { background: #2563eb; width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .btn-primary { background: #2563eb; transition: 0.3s; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #10b981 !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-5">

    <div class="glass-card w-full max-w-[400px] p-8 shadow-2xl">
        
        <div class="mb-8">
            <div class="flex items-center gap-3 mb-5">
                <span class="step-badge">1</span>
                <h2 class="text-[11px] font-bold tracking-widest text-slate-400 uppercase">API Access</h2>
            </div>
            
            <div class="input-box relative mb-4 p-4 flex items-center">
                <i class="fas fa-key text-slate-500 mr-3"></i>
                <input type="password" id="apiKey" placeholder="Paste your Gemini API Key" 
                    class="bg-transparent w-full text-sm outline-none text-slate-200">
                <i class="fas fa-eye text-slate-500 cursor-pointer hover:text-slate-300 ml-2" 
                   id="toggleIcon" onclick="togglePassword()"></i>
            </div>

            <button onclick="handleLoadModels()" id="loadBtn" class="btn-primary w-full text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                <i class="fas fa-plug text-xs" id="btnIcon"></i> 
                <span id="btnText">Load Models</span>
            </button>
        </div>

        <div id="modelSection" class="hidden mb-8 animate-in fade-in slide-in-from-top-4 duration-500">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 ml-1">Select AI Model</p>
            <div class="input-box p-4 flex justify-between items-center text-sm">
                <div class="flex items-center gap-3">
                    <i class="fas fa-microchip text-blue-500"></i>
                    <span id="currentModel">Gemini 1.5 Flash</span>
                </div>
                <i class="fas fa-chevron-down text-xs text-slate-500"></i>
            </div>
        </div>

        <div>
            <div class="flex items-center gap-3 mb-5">
                <span class="step-badge">2</span>
                <h2 class="text-[11px] font-bold tracking-widest text-slate-400 uppercase">Media Upload</h2>
            </div>
            <div class="border-2 border-dashed border-slate-700 rounded-[24px] p-10 flex flex-col items-center text-center hover:bg-slate-800/30 transition cursor-pointer">
                <i class="fas fa-cloud-upload-alt text-blue-500 text-2xl mb-3"></i>
                <p class="text-sm font-semibold text-slate-200">Click or drag file here</p>
                <div class="mt-4 bg-white text-blue-600 px-4 py-1.5 rounded-full font-black italic text-[10px] shadow-md">
                    MP4, MP3, WAV (MAX 2GB)
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. Password Toggle Logic (Eye Icon)
        function togglePassword() {
            const passwordField = document.getElementById('apiKey');
            const icon = document.getElementById('toggleIcon');
            
            if (passwordField.type === "password") {
                passwordField.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // 2. Load Models Logic (Button functionality)
        async function handleLoadModels() {
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('loadBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const modelSection = document.getElementById('modelSection');

            if (!key) {
                alert("API Key ထည့်သွင်းပေးပါဦးဗျ။");
                return;
            }

            // Start Loading State
            btn.disabled = true;
            btnText.innerText = "Connecting...";
            btnIcon.className = "fas fa-spinner fa-spin text-xs";

            try {
                // Gemini API Validation
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();

                if (data.models) {
                    // Success State
                    btn.classList.add('btn-success');
                    btnText.innerText = "Models Loaded Successfully";
                    btnIcon.className = "fas fa-check-circle text-xs";
                    
                    // Show Model Selection
                    modelSection.classList.remove('hidden');
                } else {
                    throw new Error("Invalid Key");
                }
            } catch (err) {
                // Error State
                alert("API Key မှားယွင်းနေပါသည်။ ပြန်လည်စစ်ဆေးပေးပါဗျ။");
                btn.disabled = false;
                btnText.innerText = "Load Models";
                btnIcon.className = "fas fa-plug text-xs";
            }
        }
    </script>
</body>
</html>
