<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Subtitle Studio</title>
    <script type="importmap">
        {
          "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
          }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container { width: 100%; max-width: 420px; }
        .card {
            background-color: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .label {
            font-size: 12px;
            font-weight: 800;
            color: #3b82f6;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .input-box {
            width: 100%;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }
        select.input-box {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 18px;
        }
        .btn-blue {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .upload-area {
            border: 2px dashed #334155;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background-color: rgba(15, 23, 42, 0.5);
            margin-bottom: 20px;
        }
        .btn-green {
            width: 100%;
            background-color: #16a34a;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        .result-area {
            background-color: #000;
            border-radius: 12px;
            padding: 15px;
            min-height: 150px;
            border: 1px solid #334155;
            color: #22c55e;
            font-family: monospace;
            white-space: pre-wrap;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .download-btn {
            background-color: #1e3a8a;
            color: #38bdf8;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            float: right;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">Subtitle Studio</h1>

    <div class="card">
        <div class="label">1. API & MODEL SETUP</div>
        <input type="password" id="apiKey" class="input-box" placeholder="Paste Gemini API Key Here">
        
        <div class="label" style="font-size: 10px;">SELECT AI MODEL</div>
        <select id="modelSelect" class="input-box">
            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview</option>
        </select>
        
        <button class="btn-blue" id="connectBtn">Connect API Key</button>
    </div>

    <div class="card">
        <div class="label">2. UPLOAD SOURCE (SRT OR TXT)</div>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 30px; color: #3b82f6;">⬆</div>
            <div id="file-status" style="font-weight: bold; margin-top: 10px;">Choose a file</div>
        </div>
        <input type="file" id="fileInput" hidden accept=".srt,.txt">

        <button class="btn-green" id="startBtn">Start Translation</button>
    </div>

    <div class="card">
        <div style="overflow: hidden;">
            <div class="label" style="float: left;">RESULT</div>
            <button class="download-btn" id="dlBtn">📥 Download Result</button>
        </div>
        <div class="result-area" id="output">Transcript will appear here...</div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    let fileContent = "";

    // Connect API Alert
    document.getElementById('connectBtn').addEventListener('click', () => {
        const key = document.getElementById('apiKey').value;
        if(key) alert("API Key Linked!");
    });

    // Read File content
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('file-status').innerText = "Selected: " + file.name;
            fileContent = await file.text();
        }
    });

    // Translation Logic
    document.getElementById('startBtn').addEventListener('click', async () => {
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('output');
        const modelName = document.getElementById('modelSelect').value;

        if (!key) return alert("API Key ထည့်ပါ");
        if (!fileContent) return alert("ဖိုင်ရွေးပါ");

        output.innerText = "Gemini AI is translating... Please wait...";

        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: modelName });

            const prompt = `Translate the following subtitle text into Myanmar (Burmese). 
            Maintain the SRT format (numbers and timecodes) exactly.
            Text:\n\n${fileContent}`;

            const result = await model.generateContent(prompt);
            const response = await result.response;
            const finalHtml = response.text();
            
            output.innerText = finalHtml;
            document.getElementById('dlBtn').style.display = 'block';

            // Download Logic
            document.getElementById('dlBtn').onclick = () => {
                const blob = new Blob([finalHtml], { type: 'text/plain' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "translated_subtitle.srt";
                a.click();
            };
        } catch (error) {
            output.innerText = "Error: " + error.message;
        }
    });
</script>

</body>
</html>
