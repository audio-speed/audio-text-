<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Subtitle Tool</title>

<style>

body{
background:#0b1b2b;
color:white;
font-family:sans-serif;
padding:20px;
}

.box{
background:#13263a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

select,input,textarea,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#3b82f6;
color:white;
font-size:14px;
}

.preview{
height:200px;
background:#111;
color:#0f0;
}

.row{
display:flex;
gap:10px;
}

.row button{
flex:1;
}

.upload-box{
border:2px dashed #3b82f6;
padding:30px;
text-align:center;
border-radius:12px;
cursor:pointer;
}

</style>

</head>
<body>

<h2>AI Subtitle Tool</h2>

<h3>1 CONFIGURATION</h3>

<div class="box">

<input id="apikey" placeholder="Paste your Gemini API key">

<button onclick="verifyKey()">VERIFY</button>

<p id="status"></p>

<select id="model">

<option value="gemini-3-flash">Gemini 3 Flash Preview</option>

<option value="gemini-3.1-pro">Gemini 3.1 Pro Preview</option>

<option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite Preview</option>

</select>

</div>

<h3>2 MEDIA UPLOAD</h3>

<div class="box">

<div class="upload-box">

<input type="file" id="mediaFile"
accept=".mp4,.mp3,.srt">

<p>Click to upload media or SRT file</p>

<p>MP4, MP3, SRT (MAX 1GB)</p>

</div>

<button onclick="process()">START PROCESSING</button>

</div>

<h3>Output Preview</h3>

<textarea id="output" class="preview"></textarea>

<div class="row">

<button onclick="copyText()">Copy</button>

<button onclick="clearText()">Clear</button>

</div>

<h3>Time Shift</h3>

<div class="row">

<button onclick="shift(-0.5)">-0.5s</button>

<button onclick="shift(0)">0.0s</button>

<button onclick="shift(0.5)">+0.5s</button>

</div>

<h3>SRT Style</h3>

<div class="row">

<button onclick="style('casual')">SRT 1 (Casual)</button>

<button onclick="style('polite')">SRT 2 (Polite)</button>

<button onclick="style('wuxia')">SRT 3 (Epic Wuxia)</button>

<button onclick="style('master')">SRT 4 (Grand Master)</button>

</div>

<button onclick="download()">Download SRT</button>

<script>

const fileInput=document.getElementById("mediaFile");

fileInput.addEventListener("change",function(){

const file=this.files[0];

if(!file){return;}

const maxSize=1024*1024*1024;

if(file.size>maxSize){

alert("File too large! Max 1GB allowed.");

this.value="";

return;

}

});

async function verifyKey(){

const key=document.getElementById("apikey").value

if(!key){

alert("Paste API key first")

return

}

document.getElementById("status").innerText="Checking..."

try{

const res=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models?key="+key
)

if(res.ok){

document.getElementById("status").innerText="✅ API key working"

}else{

document.getElementById("status").innerText="❌ API key invalid"

}

}catch(e){

document.getElementById("status").innerText="❌ connection error"

}

}

async function process(){

const file=document.getElementById("mediaFile").files[0]

if(!file){

alert("Upload file first")

return

}

if(file.name.endsWith(".srt")){

const text=await file.text()

document.getElementById("output").value=text

}else{

document.getElementById("output").value="Media uploaded: "+file.name

}

}

function copyText(){

const text=document.getElementById("output")

text.select()

document.execCommand("copy")

alert("Copied")

}

function clearText(){

document.getElementById("output").value=""

}

function shift(sec){

alert("Time shift "+sec+" seconds")

}

function style(type){

alert("Subtitle style: "+type)

}

function download(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="subtitle.srt"

a.click()

}

</script>

</body>
</html>
