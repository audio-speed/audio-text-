<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro - Final Fix</title>
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #00f28f;
            --input-bg: #010409; --text-dim: #8b949e;
            --success: #3fb950; --error: #ff7b72;
        }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 480px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; color: var(--accent); font-size: 1.5rem; margin-bottom: 25px; font-weight: bold; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #30363d; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-verify { background: #238636; color: white; margin-top: 5px; }
        .btn-start { background: var(--accent); color: black; font-size: 1rem; margin-top: 20px; width: 100%; }
        .flex-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-clear { background: #30363d; color: white; flex: 1; }
        .btn-download { background: #1f6feb; color: white; flex: 1; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-box { background: #010409; padding: 12px; border-radius: 10px; margin-top: 15px; border: 1px solid #30363d; font-size: 0.85rem; }
        textarea { height: 180px; font-family: 'Courier New', monospace; font-size: 0.9rem; }
        #timeLeft { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-closed-captioning"></i> Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input File (MP3 / SRT)</label>
        <input type="file" id="fileInput" accept=".mp3, .srt">
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Paste API Key here...">
        <button class="btn btn-verify" id="verifyBtn" onclick="checkKey()">Verify Key</button>
        <div id="vStatus" style="font-size: 0.8rem; margin-top: 8px; color: var(--error);">Not Verified</div>
    </div>

    <div class="input-group">
        <label>Select AI Model</label>
        <select id="modelSelect">
            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <button class="btn btn-start" id="startBtn" onclick="processTask()">
        <i class="fas fa-magic"></i> Start Translation
    </button>

    <div class="status-box" id="timerBox" style="display: none;">
        <div>Status: <span id="statusText">Processing...</span></div>
        <div>Estimated: <span id="timeLeft">0s</span></div>
    </div>

    <div class="input-group" style="margin-top: 20px;">
        <label>Raw SRT Output (Ready for Player)</label>
        <textarea id="outputBox" readonly placeholder="Output will appear here..."></textarea>
    </div>

    <div class="flex-btns">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadSRT()" disabled>Download SRT</button>
    </div>
</div>

<script>
    let isVerified = false;
    let timerInterval;

    async function checkKey() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('vStatus');
        if (!key) return alert("Key ထည့်ပါ");
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            if (res.ok) {
                isVerified = true;
                status.innerText = "Verified!";
                status.style.color = "var(--success)";
                document.getElementById('verifyBtn').style.display = "none";
            } else { throw new Error(); }
        } catch (e) { status.innerText = "Invalid Key!"; }
    }

    async function processTask() {
        const fileInput = document.getElementById('fileInput');
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('outputBox');
        const btn = document.getElementById('startBtn');
        const model = document.getElementById('modelSelect').value;

        if (!fileInput.files[0] || !isVerified) return alert("ဖိုင်ရွေးပြီး Key Verify လုပ်ပါ");

        const file = fileInput.files[0];
        btn.disabled = true;
        document.getElementById('timerBox').style.display = "block";
        let seconds = file.type.includes('audio') ? 45 : 20;
        
        timerInterval = setInterval(() => {
            seconds--;
            document.getElementById('timeLeft').innerText = seconds + "s";
            if (seconds <= 0) clearInterval(timerInterval);
        }, 1000);

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                let prompt = "";
                if (file.type.includes('audio')) {
                    const base64 = e.target.result.split(',')[1];
                    prompt = "Transcribe this audio to Myanmar SRT. Output ONLY raw SRT. Use English numbers for timestamps.";
                    sendToAI(key, model, prompt, base64, true);
                } else {
                    prompt = "Translate this SRT to Myanmar. Output ONLY the raw SRT format. No intro text. Keep English timestamps:\n\n" + e.target.result;
                    sendToAI(key, model, prompt, null, false);
                }
            } catch (err) { alert("Error reading file"); }
        };

        if (file.type.includes('audio')) reader.readAsDataURL(file);
        else reader.readAsText(file);
    }

    async function sendToAI(key, model, prompt, base64, isAudio) {
        const output = document.getElementById('outputBox');
        let bodyContent = isAudio ? 
            { contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "audio/mp3", data: base64 } }] }] } :
            { contents: [{ parts: [{ text: prompt }] }] };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyContent)
            });
            const data = await response.json();
            if (data.candidates) {
                let cleanText = data.candidates[0].content.parts[0].text;
                // အပိုပါလာတဲ့ ```srt သို့မဟုတ် စာသားများကို ဖယ်ထုတ်ခြင်း
                cleanText = cleanText.replace(/```srt/g, "").replace(/```/g, "").trim();
                output.value = cleanText;
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('statusText').innerText = "Finished!";
            }
        } catch (e) { output.value = "AI Error occurred."; }
        finally { clearInterval(timerInterval); document.getElementById('startBtn').disabled = false; }
    }

    function downloadSRT() {
        const text = document.getElementById('outputBox').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "translated.srt";
        a.click();
    }

    function clearAll() {
        document.getElementById('fileInput').value = "";
        document.getElementById('outputBox').value = "";
        document.getElementById('timerBox').style.display = "none";
        document.getElementById('downloadBtn').disabled = true;
    }
</script>

</body>
</html>
