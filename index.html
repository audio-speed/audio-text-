<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #00f28f;
            --error: #ff7b72;
            --success: #3fb950;
            --text-dim: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #30363d;
        }

        .header {
            text-align: center;
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .password-wrapper { position: relative; }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-dim);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        #verifyBtn { background: #238636; color: white; }
        #verifyBtn:disabled { background: #1a4d2e; cursor: not-allowed; }

        #startBtn { background: var(--accent); color: black; margin-top: 20px; }

        .status {
            font-size: 0.85rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status.not-verified { color: var(--error); }
        .status.verified { color: var(--success); }
        .status.loading { color: skyblue; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-robot"></i> Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input Files (MP3 / SRT)</label>
        <input type="file" id="fileInput" multiple>
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <div class="password-wrapper">
            <input type="password" id="apiKey" placeholder="Enter your key here...">
            <i class="fas fa-eye eye-icon" onclick="togglePassword()"></i>
        </div>
        
        <button class="btn" id="verifyBtn" onclick="checkApiKey()">Verify API Key</button>
        
        <div id="statusArea" class="status not-verified">
            <i class="fas fa-circle-exclamation"></i> <span>Not Verified</span>
        </div>
    </div>

    <div class="input-group">
        <label>AI Model</label>
        <select>
            <option>Gemini 3 Flash Preview</option>
            <option>Gemini 3.1 Pro Preview</option>
            <option>Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <div class="input-group">
        <label>Output Format</label>
        <select>
            <option>Myanmar SRT (Translated)</option>
            <option>Original SRT (English)</option>
        </select>
    </div>

    <button class="btn" id="startBtn"><i class="fas fa-play"></i> Start Translation</button>
</div>

<script>
    function togglePassword() {
        const keyInput = document.getElementById('apiKey');
        const icon = event.target;
        if (keyInput.type === 'password') {
            keyInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            keyInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    async function checkApiKey() {
        const key = document.getElementById('apiKey').value;
        const statusArea = document.getElementById('statusArea');
        const statusText = statusArea.querySelector('span');
        const statusIcon = statusArea.querySelector('i');
        const verifyBtn = document.getElementById('verifyBtn');

        if (!key) {
            alert("Please enter API Key first!");
            return;
        }

        // UI Loading State
        verifyBtn.disabled = true;
        statusArea.className = "status loading";
        statusText.innerText = "Checking...";
        statusIcon.className = "fas fa-spinner fa-spin";

        try {
            // Gemini API ကို အစမ်းခေါ်ကြည့်ပြီး Key မှန်မမှန် စစ်ဆေးခြင်း
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            
            if (response.ok) {
                // Key မှန်သွားလျှင်
                statusArea.className = "status verified";
                statusText.innerText = "Verified Successfully!";
                statusIcon.className = "fas fa-check-circle";
                verifyBtn.style.display = "none"; // Verify ဖြစ်သွားရင် ခလုတ်ဖျောက်ထားလို့ရပါတယ်
            } else {
                // Key မှားလျှင်
                throw new Error();
            }
        } catch (error) {
            statusArea.className = "status not-verified";
            statusText.innerText = "Invalid API Key. Try again.";
            statusIcon.className = "fas fa-circle-xmark";
            verifyBtn.disabled = false;
        }
    }
</script>

</body>
</html>
