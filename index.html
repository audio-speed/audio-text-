<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subtitle AI Pro - V4</title>

<style>
:root {
    --bg:#0d1117; --card:#161b22; --accent:#00f28f;
    --input-bg:#0d1117; --text-dim:#8b949e;
    --error:#ff7b72; --success:#3fb950;
}
body {
    background:var(--bg); color:white; font-family:sans-serif;
    display:flex; justify-content:center; padding:20px; margin:0;
}
.container {
    width:100%; max-width:460px; background:var(--card);
    border-radius:20px; padding:30px;
}
.header { text-align:center; color:var(--accent); font-size:1.6rem; margin-bottom:20px; }

input,select,textarea,button {
    width:100%; padding:12px; margin-top:10px;
    border-radius:10px; border:none;
}
button { font-weight:bold; cursor:pointer; }

.btn-start { background:var(--accent); color:black; }
.btn-download { background:#238636; color:white; margin-top:10px; }

textarea { height:160px; margin-top:10px; }

</style>
</head>

<body>
<div class="container">

<div class="header">Subtitle AI Pro V4</div>

<!-- MP3 -->
<label>Input MP3 (optional)</label>
<input type="file" id="mp3Input" accept=".mp3">

<!-- SRT -->
<label>Input SRT</label>
<input type="file" id="fileInput" accept=".srt">

<!-- Output Type -->
<label>Select Output</label>
<select id="outputType">
    <option value="original">Original SRT</option>
    <option value="mmsub">Myanmar (MMSUB)</option>
</select>

<!-- API -->
<label>API Key</label>
<input type="password" id="apiKey">

<button class="btn-start" onclick="processTranslation()">Start</button>

<textarea id="outputBox" placeholder="Result here..."></textarea>

<button class="btn-download" onclick="downloadResult()">Download</button>

</div>

<script>

let originalSRT = "";
let translatedSRT = "";

// MAIN PROCESS
async function processTranslation() {

    const file = document.getElementById('fileInput').files[0];
    const key = document.getElementById('apiKey').value;
    const output = document.getElementById('outputBox');

    if (!file) return alert("SRT ထည့်ပါ");

    const text = await file.text();
    originalSRT = text;

    if (!key) {
        output.value = text;
        alert("API မထည့်ထားဘူး → Original ပြမယ်");
        return;
    }

    output.value = "Translating...";

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                contents:[{
                    parts:[{
                        text:`Translate SRT to Myanmar. Keep format.\n\n${text}`
                    }]
                }]
            })
        });

        const data = await res.json();

        translatedSRT = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error";

        output.value = translatedSRT;

    } catch(e) {
        output.value = "Error!";
    }
}

// DOWNLOAD FUNCTION
function downloadResult() {

    const type = document.getElementById('outputType').value;

    let content = "";
    let filename = "";

    if (type === "original") {
        content = originalSRT;
        filename = "original.srt";
    } else {
        content = translatedSRT || "No MMSUB yet!";
        filename = "mmsub.srt";
    }

    const blob = new Blob([content], {type:"text/plain"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
