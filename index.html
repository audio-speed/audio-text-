<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro - Advanced</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #00f28f;
            --input-bg: #0d1117; --text-dim: #8b949e;
            --success: #3fb950; --error: #ff7b72;
        }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 480px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #30363d; }
        .header { text-align: center; color: var(--accent); font-size: 1.5rem; margin-bottom: 25px; font-weight: bold; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #30363d; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; }
        .btn-verify { background: #238636; color: white; }
        .btn-start { background: var(--accent); color: black; font-size: 1rem; margin-top: 20px; }
        .btn-clear { background: #30363d; color: white; flex: 1; }
        .btn-download { background: #1f6feb; color: white; flex: 1; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-box { background: #010409; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid #30363d; font-size: 0.85rem; }
        .flex-btns { display: flex; gap: 10px; margin-top: 15px; }
        textarea { height: 150px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-brain"></i> Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input SRT File</label>
        <input type="file" id="fileInput" accept=".srt">
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Enter API Key...">
        <button class="btn btn-verify" id="verifyBtn" onclick="checkKey()">Verify Key</button>
        <div id="vStatus" style="font-size: 0.85rem; margin-top: 8px; color: var(--error);">Not Verified</div>
    </div>

    <div class="input-group">
        <label>Select AI Model</label>
        <select id="modelSelect">
            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <button class="btn btn-start" id="startBtn" onclick="processTranslation()">
        <i class="fas fa-play"></i> Start Translation
    </button>

    <div class="status-box" id="timerBox" style="display: none;">
        <div>Status: <span id="statusText">Idle</span></div>
        <div>Estimated Time: <span id="timeLeft">0s</span></div>
    </div>

    <div class="input-group" style="margin-top: 20px;">
        <label>Translation Result</label>
        <textarea id="outputBox" readonly placeholder="ရလဒ်ကို ဤနေရာတွင် ပြပေးပါမည်..."></textarea>
    </div>

    <div class="flex-btns">
        <button class="btn btn-clear" onclick="clearAll()"><i class="fas fa-trash"></i> Clear</button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadSRT()" disabled><i class="fas fa-download"></i> Download</button>
    </div>
</div>

<script>
    let isVerified = false;
    let timerInterval;

    async function checkKey() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('vStatus');
        if (!key) return alert("Key ထည့်ပါ");
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            if (res.ok) {
                isVerified = true;
                status.innerText = "Verified Successfully!";
                status.style.color = "var(--success)";
                document.getElementById('verifyBtn').style.display = "none";
            } else { throw new Error(); }
        } catch (e) { status.innerText = "Invalid Key!"; }
    }

    async function processTranslation() {
        const fileInput = document.getElementById('fileInput');
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('outputBox');
        const btn = document.getElementById('startBtn');
        const model = document.getElementById('modelSelect').value;

        if (!fileInput.files[0] || !isVerified) return alert("File ရွေးပါ သို့မဟုတ် Key Verify အရင်လုပ်ပါ");

        btn.disabled = true;
        document.getElementById('timerBox').style.display = "block";
        
        // ကြာချိန်တွက်ချက်ခြင်း (ခန့်မှန်းခြေ စက္ကန့် ၃၀ ထားထားပါတယ်)
        let seconds = 30;
        document.getElementById('statusText').innerText = "Translating...";
        timerInterval = setInterval(() => {
            seconds--;
            document.getElementById('timeLeft').innerText = seconds + "s";
            if (seconds <= 0) clearInterval(timerInterval);
        }, 1000);

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Translate this SRT to Myanmar. Keep format: \n\n" + e.target.result }] }]
                    })
                });
                const data = await response.json();
                if (data.candidates) {
                    output.value = data.candidates[0].content.parts[0].text;
                    document.getElementById('downloadBtn').disabled = false;
                    document.getElementById('statusText').innerText = "Completed!";
                    clearInterval(timerInterval);
                }
            } catch (err) {
                output.value = "Error occurred.";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Start Translation';
            }
        };
        reader.readAsText(fileInput.files[0]);
    }

    function downloadSRT() {
        const text = document.getElementById('outputBox').value;
        if (!text) return;
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = "translated_subtitle.srt";
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    }

    function clearAll() {
        document.getElementById('fileInput').value = "";
        document.getElementById('outputBox').value = "";
        document.getElementById('downloadBtn').disabled = true;
        document.getElementById('timerBox').style.display = "none";
        document.getElementById('timeLeft').innerText = "0s";
    }
</script>

</body>
</html>
