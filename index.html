<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro - Ultimate Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #00f28f;
            --input-bg: #010409; --text-dim: #8b949e;
            --success: #3fb950; --error: #ff7b72;
        }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 480px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; color: var(--accent); font-size: 1.5rem; margin-bottom: 25px; font-weight: bold; }
        
        /* Estimated Time Area */
        .timer-box { background: #010409; border: 1px solid #30363d; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: center; display: none; }
        .timer-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .timer-val { font-size: 2rem; font-weight: bold; color: var(--accent); font-family: monospace; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-dim); }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #30363d; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-verify { background: #238636; color: white; margin-top: 5px; }
        .btn-start { background: var(--accent); color: black; font-size: 1rem; margin-top: 20px; }
        
        .flex-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-clear { background: #30363d; color: white; flex: 1; }
        .btn-download { background: #1f6feb; color: white; flex: 1; }
        .btn:disabled { opacity: 0.5; }
        
        textarea { height: 180px; font-family: 'Courier New', monospace; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-magic"></i> Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input File (MP3 for Transcription / SRT for Translation)</label>
        <input type="file" id="fileInput" accept=".mp3, .srt">
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Enter your key here...">
        <button class="btn btn-verify" id="verifyBtn" onclick="checkKey()">Verify API Key</button>
        <div id="vStatus" style="font-size: 0.8rem; margin-top: 8px; color: var(--error);">Not Verified</div>
    </div>

    <div class="input-group">
        <label>AI Model</label>
        <select id="modelSelect">
            <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <button class="btn btn-start" id="startBtn" onclick="processTask()">
        <i class="fas fa-play"></i> Start Translation
    </button>

    <div class="timer-box" id="timerBox">
        <div class="timer-label">Estimated Time Remaining</div>
        <div class="timer-val" id="countdown">00:00</div>
        <div id="statusLabel" style="font-size: 0.75rem; color: var(--accent); margin-top: 5px;">AI is processing...</div>
    </div>

    <textarea id="outputBox" readonly placeholder="Raw SRT output will appear here..."></textarea>

    <div class="flex-btns">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadSRT()" disabled>Download SRT</button>
    </div>
</div>

<script>
    let isVerified = false;
    let timerId;

    async function checkKey() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('vStatus');
        if (!key) return alert("Key ထည့်ပါ");
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            if (res.ok) {
                isVerified = true;
                status.innerText = "Verified Successfully! ✅";
                status.style.color = "var(--success)";
                document.getElementById('verifyBtn').style.display = "none";
            } else { throw new Error(); }
        } catch (e) { status.innerText = "Invalid Key! Please check."; }
    }

    async function processTask() {
        const fileInput = document.getElementById('fileInput');
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('outputBox');
        const btn = document.getElementById('startBtn');
        const model = document.getElementById('modelSelect').value;

        if (!fileInput.files[0] || !isVerified) return alert("File ရွေးပြီး Key Verify အရင်လုပ်ပါ");

        const file = fileInput.files[0];
        btn.disabled = true;
        document.getElementById('timerBox').style.display = "block";
        
        let timeLeft = file.type.includes('audio') ? 50 : 25;
        updateTimer(timeLeft);
        
        timerId = setInterval(() => {
            timeLeft--;
            updateTimer(timeLeft);
            if (timeLeft <= 0) clearInterval(timerId);
        }, 1000);

        const reader = new FileReader();
        reader.onload = async (e) => {
            let bodyData;
            if (file.type.includes('audio')) {
                const base64 = e.target.result.split(',')[1];
                bodyData = {
                    contents: [{
                        parts: [
                            { text: "Transcribe this audio into Myanmar SRT format. Output ONLY raw SRT. No intro text. Keep English timestamps (00:00:00,000)." },
                            { inline_data: { mime_type: "audio/mp3", data: base64 } }
                        ]
                    }],
                    generationConfig: { temperature: 0.1 }
                };
            } else {
                bodyData = {
                    contents: [{
                        parts: [{ text: "Translate this SRT to Myanmar. Output ONLY the raw SRT data. Do not include any sentences like 'Here is the translation'. Ensure timestamps are in English numbers:\n\n" + e.target.result }]
                    }],
                    generationConfig: { temperature: 0.1 }
                };
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let finalSRT = data.candidates[0].content.parts[0].text;
                    // Clean code blocks if any
                    finalSRT = finalSRT.replace(/```srt/g, "").replace(/```/g, "").trim();
                    output.value = finalSRT;
                    document.getElementById('downloadBtn').disabled = false;
                    document.getElementById('statusLabel').innerText = "Finished Successfully!";
                } else {
                    output.value = "Error: API Response contains no text.";
                }
            } catch (err) {
                output.value = "Error: " + err.message;
            } finally {
                clearInterval(timerId);
                btn.disabled = false;
            }
        };

        if (file.type.includes('audio')) reader.readAsDataURL(file);
        else reader.readAsText(file);
    }

    function updateTimer(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        document.getElementById('countdown').innerText = `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function downloadSRT() {
        const text = document.getElementById('outputBox').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "translated_mysub.srt";
        a.click();
    }

    function clearAll() {
        location.reload();
    }
</script>

</body>
</html>
