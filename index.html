<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro - Estimated Time</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #00f28f;
            --input-bg: #010409; --text-dim: #8b949e;
            --success: #3fb950; --error: #ff7b72;
        }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 480px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; color: var(--accent); font-size: 1.5rem; margin-bottom: 25px; font-weight: bold; }
        
        /* Estimated Time Box Style */
        .timer-container {
            background: #010409;
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            display: none; /* စစချင်း ဖျောက်ထားမည် */
            text-align: center;
        }
        .timer-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .timer-display { font-size: 2rem; font-weight: bold; color: var(--accent); font-family: monospace; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid #30363d; border-radius: 10px; color: white; outline: none; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-start { background: var(--accent); color: black; font-size: 1rem; margin-top: 10px; }
        .btn-start:disabled { opacity: 0.5; }
        
        .flex-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-clear { background: #30363d; color: white; flex: 1; }
        .btn-download { background: #1f6feb; color: white; flex: 1; }
        
        textarea { height: 150px; font-family: 'Courier New', monospace; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-microchip"></i> Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input File (MP3 / SRT)</label>
        <input type="file" id="fileInput" accept=".mp3, .srt">
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Enter API Key...">
        <button class="btn" style="background: #238636; color: white; margin-top: 5px;" id="verifyBtn" onclick="checkKey()">Verify Key</button>
    </div>

    <div class="input-group">
        <label>Model</label>
        <select id="modelSelect">
            <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash Lite (အမြန်ဆုံး)</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (အကောင်းဆုံး)</option>
        </select>
    </div>

    <button class="btn btn-start" id="startBtn" onclick="startTranslation()">
        <i class="fas fa-play"></i> Start Translation
    </button>

    <div class="timer-container" id="timerBox">
        <div class="timer-label">Estimated Time Remaining</div>
        <div class="timer-display" id="countdown">00:00</div>
        <div id="statusLabel" style="font-size: 0.8rem; color: var(--accent); margin-top: 5px;">AI is working...</div>
    </div>

    <textarea id="outputBox" readonly placeholder="Output will appear here..."></textarea>

    <div class="flex-btns">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadFile()" disabled>Download</button>
    </div>
</div>

<script>
    let isVerified = false;
    let timerId;

    async function checkKey() {
        const key = document.getElementById('apiKey').value;
        if (!key) return alert("Key ထည့်ပါ");
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
        if (res.ok) {
            isVerified = true;
            alert("Verified!");
            document.getElementById('verifyBtn').innerText = "Verified ✅";
        } else { alert("Invalid Key!"); }
    }

    function startTranslation() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0] || !isVerified) return alert("ဖိုင်ရွေးပြီး Key Verify အရင်လုပ်ပါ");

        const file = fileInput.files[0];
        const btn = document.getElementById('startBtn');
        const timerBox = document.getElementById('timerBox');
        
        btn.disabled = true;
        timerBox.style.display = "block";

        // Estimated Time တွက်ချက်ခြင်း
        // SRT ဆိုရင် စက္ကန့် ၂၀၊ MP3 ဆိုရင် စက္ကန့် ၆၀ ခန့်မှန်း
        let timeLeft = file.type.includes('audio') ? 60 : 25;
        
        updateTimerDisplay(timeLeft);
        
        timerId = setInterval(() => {
            timeLeft--;
            updateTimerDisplay(timeLeft);
            if (timeLeft <= 5) {
                document.getElementById('statusLabel').innerText = "Almost done...";
            }
            if (timeLeft <= 0) clearInterval(timerId);
        }, 1000);

        // AI Logic ခေါ်ယူခြင်း (နမူနာအနေနဲ့ FileReader သုံးပြထားပါတယ်)
        const reader = new FileReader();
        reader.onload = async (e) => {
            // ဤနေရာတွင် API Call ပြုလုပ်ပါ (ယခင်ကုဒ်များအတိုင်း)
            // ရလဒ်ရလာတဲ့အခါ အောက်ပါတို့ကို လုပ်ဆောင်ပါ -
            // clearInterval(timerId);
            // document.getElementById('statusLabel').innerText = "Finished!";
            // document.getElementById('downloadBtn').disabled = false;
        };
        reader.readAsText(file);
    }

    function updateTimerDisplay(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        document.getElementById('countdown').innerText = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function clearAll() {
        location.reload(); // အလွယ်ကူဆုံး အကုန်ရှင်းထုတ်နည်း
    }

    function downloadFile() {
        const text = document.getElementById('outputBox').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "translated.srt";
        a.click();
    }
</script>

</body>
</html>
