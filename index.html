<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #00f28f; --text-dim: #8b949e; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #30363d; }
        .header { text-align: center; color: var(--accent); font-size: 1.5rem; margin-bottom: 25px; font-weight: bold; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        input, select, textarea { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        #verifyBtn { background: #238636; color: white; }
        #startBtn { background: var(--accent); color: black; font-size: 1rem; margin-top: 20px; }
        #startBtn:disabled { background: #005a35; cursor: not-allowed; opacity: 0.6; }
        .status { font-size: 0.85rem; margin-top: 8px; display: flex; align-items: center; gap: 5px; }
        textarea { height: 120px; resize: none; font-family: monospace; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🤖 Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input Files (MP3 / SRT)</label>
        <input type="file" id="fileInput" accept=".mp3,.srt">
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Enter API Key...">
        <button class="btn" id="verifyBtn" onclick="checkKey()">Verify Key</button>
        <div id="vStatus" class="status" style="color: #ff7b72;">Not Verified</div>
    </div>

    <div class="input-group">
        <label>AI Model</label>
        <select id="modelIdx">
            <option value="gemini-3-flash">Gemini 3 Flash Preview</option>
            <option value="gemini-3.1-pro">Gemini 3.1 Pro Preview</option>
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash Lite Preview</option>
        </select>
    </div>

    <button class="btn" id="startBtn" onclick="processTranslation()">
        <i class="fas fa-play"></i> Start Translation
    </button>

    <div class="input-group" style="margin-top: 25px;">
        <label>Output Preview</label>
        <textarea id="outputBox" readonly placeholder="Subtitle output will appear here..."></textarea>
    </div>
</div>

<script>
    let isVerified = false;

    // API Key စစ်ဆေးခြင်း
    async function checkKey() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('vStatus');
        if(!key) return alert("Key ထည့်ပါ");

        status.innerText = "Checking...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            if(res.ok) {
                isVerified = true;
                status.innerText = "Verified!";
                status.style.color = "#3fb950";
            } else { throw new Error(); }
        } catch(e) {
            status.innerText = "Invalid Key!";
            status.style.color = "#ff7b72";
        }
    }

    // Translation စတင်ခြင်း Logic
    async function processTranslation() {
        const file = document.getElementById('fileInput').files[0];
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('outputBox');
        const btn = document.getElementById('startBtn');

        if(!file || !isVerified) {
            alert("ဖိုင်အရင်ရွေးပါ သို့မဟုတ် API Key အရင် Verify လုပ်ပါ");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        output.value = "AI မှ စာသားများကို ဘာသာပြန်နေပါပြီ... ခဏစောင့်ပေးပါ။";

        // ဤနေရာတွင် သင်၏ API Call Logic ကို ထည့်သွင်းရပါမည်
        // ယခုနမူနာအနေဖြင့် ၃ စက္ကန့်အကြာတွင် အလုပ်လုပ်ပုံကို ပြထားပါသည်
        setTimeout(() => {
            output.value = "1\n00:00:01,000 --> 00:00:04,000\nမင်္ဂလာပါ၊ အခုဒါက ဘာသာပြန်ထားတဲ့ စာသားပါ။";
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> Start Translation';
            alert("ဘာသာပြန်ခြင်း ပြီးဆုံးပါပြီ!");
        }, 3000);
    }
</script>

</body>
</html>
