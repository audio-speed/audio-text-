<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP3 → SRT Translator</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: #fff;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}
button {
  background: #00c853;
  color: white;
  cursor: pointer;
}
button:disabled {
  background: gray;
}
.progress {
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: #00e676;
}
textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎧 MP3 → SRT + Myanmar</h2>

<div class="card">
<label>Upload MP3</label>
<input type="file" id="file">
</div>

<div class="card">
<label>API Key</label>
<input type="text" id="apiKey" placeholder="Enter API Key">
<button onclick="verifyAPI()">Verify</button>
<p id="apiStatus">Not verified</p>
</div>

<div class="card">
<label>Model</label>
<select id="model">
<option>Gemini 3 Flash Preview</option>
<option>Gemini 3.1 Pro Preview</option>
<option>Gemini 3.1 Flash Lite Preview</option>
</select>
</div>

<div class="card">
<label>Output</label>
<select id="format">
<option>Both</option>
<option>Original SRT</option>
<option>Myanmar SRT</option>
</select>
</div>

<div class="card">
<button id="startBtn" onclick="startProcess()" disabled>
▶️ Start Translation
</button>
</div>

<div class="card">
<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>
<p id="status">Idle</p>
<p id="time">Estimated: -</p>
</div>

<div class="card">
<label>Result Preview</label>
<textarea id="result"></textarea>
<button onclick="clearText()">Clear</button>
<button onclick="copyText()">Copy</button>
</div>

<div class="card">
<button onclick="downloadFile()">Download</button>
</div>

</div>

<script>
let verified = false;
let fileUploaded = false;

document.getElementById("file").addEventListener("change", () => {
  fileUploaded = true;
  checkReady();
});

function verifyAPI() {
  let key = document.getElementById("apiKey").value;
  if (key.length > 5) {
    verified = true;
    document.getElementById("apiStatus").innerText = "✅ Connected";
  } else {
    verified = false;
    document.getElementById("apiStatus").innerText = "❌ Failed";
  }
  checkReady();
}

function checkReady() {
  document.getElementById("startBtn").disabled = !(verified && fileUploaded);
}

function startProcess() {
  let progress = 0;
  let bar = document.getElementById("progressBar");

  let interval = setInterval(() => {
    progress += 10;
    bar.style.width = progress + "%";

    document.getElementById("status").innerText =
      progress < 40 ? "Uploading..." :
      progress < 70 ? "Transcribing..." :
      "Translating...";

    document.getElementById("time").innerText =
      "Estimated: " + (100 - progress) / 10 + " sec";

    if (progress >= 100) {
      clearInterval(interval);
      document.getElementById("status").innerText = "✅ Done";

      document.getElementById("result").value =
`1
00:00:01,000 --> 00:00:03,000
Hello world

1
00:00:01,000 --> 00:00:03,000
မင်္ဂလာပါ ကမ္ဘာကြီး`;
    }

  }, 500);
}

function clearText() {
  document.getElementById("result").value = "";
}

function copyText() {
  let text = document.getElementById("result");
  text.select();
  document.execCommand("copy");
  alert("Copied!");
}

function downloadFile() {
  let blob = new Blob([document.getElementById("result").value], {type: "text/plain"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "subtitle.srt";
  a.click();
}
</script>

</body>
</html>
