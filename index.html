<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AI Subtitle Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen text-white p-6">

<h1 class="text-2xl font-bold mb-6 text-center">

AI Subtitle Tool

</h1>


<div class="max-w-3xl mx-auto space-y-6">

<!-- CONFIG -->

<div class="bg-white/10 backdrop-blur-lg p-5 rounded-xl">

<input id="apiKey"

class="w-full p-3 rounded text-black"

placeholder="Paste your Gemini API key">


<button onclick="verifyKey()"

class="w-full mt-3 bg-blue-500 hover:bg-blue-600 p-3 rounded">

VERIFY

</button>


<select id="model"

class="w-full mt-3 p-3 rounded text-black">

<option>Gemini 3 Flash Preview</option>

<option>Gemini 3.1 Pro Preview</option>

<option>Gemini 3.1 Flash Lite Preview</option>

</select>

</div>


<!-- UPLOAD -->

<div class="bg-white/10 backdrop-blur-lg p-5 rounded-xl">

<input type="file"

id="file"

accept=".mp4,.mp3,.srt"

class="w-full">


<p class="text-sm opacity-70 mt-2">

MP4 MP3 SRT (MAX 1GB)

</p>


<button onclick="startProcessing()"

class="w-full mt-4 bg-blue-500 hover:bg-blue-600 p-3 rounded">

START PROCESSING

</button>

</div>


<!-- OUTPUT -->

<textarea id="output"

class="w-full h-60 p-3 rounded text-black"

placeholder="Output Preview">

</textarea>


<div class="grid grid-cols-2 gap-3">

<button onclick="copyText()"

class="bg-green-500 p-3 rounded">

Copy

</button>


<button onclick="clearText()"

class="bg-red-500 p-3 rounded">

Clear

</button>

</div>


<!-- TIME SHIFT -->

<h2 class="mt-4 font-bold">

Time Shift

</h2>


<div class="grid grid-cols-3 gap-3">

<button onclick="shiftTime(-0.5)"

class="bg-blue-500 p-2 rounded">

-0.5s

</button>


<button onclick="shiftTime(0)"

class="bg-blue-500 p-2 rounded">

0.0s

</button>


<button onclick="shiftTime(0.5)"

class="bg-blue-500 p-2 rounded">

+0.5s

</button>

</div>


<!-- STYLE -->

<h2 class="mt-4 font-bold">

SRT Style

</h2>


<div class="grid grid-cols-2 gap-3">

<button onclick="setStyle('casual')"

class="bg-blue-500 p-2 rounded">

SRT 1 (Casual)

</button>


<button onclick="setStyle('polite')"

class="bg-blue-500 p-2 rounded">

SRT 2 (Polite)

</button>


<button onclick="setStyle('wuxia')"

class="bg-blue-500 p-2 rounded">

SRT 3 (Epic Wuxia)

</button>


<button onclick="setStyle('master')"

class="bg-blue-500 p-2 rounded">

SRT 4 (Grand Master)

</button>

</div>


<button onclick="downloadSRT()"

class="w-full mt-4 bg-purple-600 p-3 rounded">

Download SRT

</button>


</div>


<script>

function verifyKey(){

alert("API Key Verified")

}


function startProcessing(){

let file=document.getElementById("file").files[0]

if(!file){

alert("Upload file first")

return

}


let output=document.getElementById("output")


output.value="Processing...\n"


setTimeout(()=>{

output.value="1\n00:00:01,000 --> 00:00:03,000\nHello\n\n2\n00:00:03,000 --> 00:00:05,000\nThis is AI subtitle preview."

},1500)

}


function copyText(){

let text=document.getElementById("output")

text.select()

document.execCommand("copy")

}


function clearText(){

document.getElementById("output").value=""

}


function shiftTime(value){

alert("Time Shift "+value+"s")

}


function setStyle(style){

alert("Style: "+style)

}


function downloadSRT(){

let text=document.getElementById("output").value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="subtitle.srt"

a.click()

}

</script>


</body>

</html>
