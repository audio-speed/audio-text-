<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtitle AI Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #00f28f;
            --input-bg: #0d1117;
            --text-dim: #8b949e;
            --error: #ff7b72;
            --success: #3fb950;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #30363d;
        }

        .header {
            text-align: center;
            color: var(--accent);
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #30363d;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-verify { background: #238636; color: white; margin-top: 10px; }
        .btn-start { background: var(--accent); color: black; margin-top: 20px; font-size: 1rem; }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { font-size: 0.85rem; margin-top: 8px; display: flex; align-items: center; gap: 5px; }

        textarea { height: 150px; font-family: monospace; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><i class="fas fa-robot"></i> Subtitle AI Pro</div>

    <div class="input-group">
        <label>Input SRT File</label>
        <input type="file" id="fileInput" accept=".srt">
    </div>

    <div class="input-group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Enter API Key...">
        <button class="btn btn-verify" id="verifyBtn" onclick="checkKey()">Verify API Key</button>
        <div id="vStatus" class="status" style="color: var(--error);">Not Verified</div>
    </div>

    <div class="input-group">
        <label>AI Model</label>
        <select id="modelSelect">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Precise)</option>
        </select>
    </div>

    <button class="btn btn-start" id="startBtn" onclick="processTranslation()">
        <i class="fas fa-play"></i> Start Translation
    </button>

    <div class="input-group" style="margin-top: 20px;">
        <label>Output Preview</label>
        <textarea id="outputBox" readonly placeholder="Translated subtitles will appear here..."></textarea>
    </div>
</div>

<script>
    let isVerified = false;

    // API Key စစ်ဆေးခြင်း
    async function checkKey() {
        const key = document.getElementById('apiKey').value;
        const status = document.getElementById('vStatus');
        if (!key) return alert("API Key ထည့်ပေးပါ");

        status.innerText = "Checking...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            if (res.ok) {
                isVerified = true;
                status.innerText = "Verified Successfully!";
                status.style.color = "var(--success)";
                document.getElementById('verifyBtn').style.display = "none";
            } else { throw new Error(); }
        } catch (e) {
            status.innerText = "Invalid API Key!";
            status.style.color = "var(--error)";
        }
    }

    // ဘာသာပြန်ခြင်း လုပ်ငန်းစဉ်
    async function processTranslation() {
        const fileInput = document.getElementById('fileInput');
        const key = document.getElementById('apiKey').value;
        const output = document.getElementById('outputBox');
        const btn = document.getElementById('startBtn');
        const model = document.getElementById('modelSelect').value;

        if (!fileInput.files[0]) return alert("SRT ဖိုင် အရင်ရွေးပါ");
        if (!isVerified) return alert("API Key ကို အရင် Verify လုပ်ပါ");

        const file = fileInput.files[0];
        const reader = new FileReader();

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        output.value = "ဘာသာပြန်နေပါပြီ။ ခဏစောင့်ပေးပါ...";

        reader.onload = async (e) => {
            const srtContent = e.target.result;
            
            // ဖိုင်အရွယ်အစား ကြီးလွန်းရင် အပိုင်းခွဲပို့ဖို့ လိုအပ်နိုင်ပါတယ်
            // ဒါက အခြေခံ ပို့ဆောင်ပုံပါ
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: "Translate the following SRT text into Myanmar. Keep the original SRT format and timestamps exactly. \n\n" + srtContent
                            }]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.value = data.candidates[0].content.parts[0].text;
                    alert("ဘာသာပြန်ခြင်း ပြီးဆုံးပါပြီ!");
                } else if (data.error) {
                    output.value = "Error: " + data.error.message;
                } else {
                    output.value = "ဘာသာပြန်လို့ မရပါ။ (Empty Response)";
                }
            } catch (err) {
                output.value = "Network Error ဖြစ်နေပါတယ်။ " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Start Translation';
            }
        };

        reader.readAsText(file);
    }
</script>

</body>
</html>
